url: https://theabhirath.github.io/transclust

authors:
  Abhirath Anand:
    href: https://theabhirath.github.io

template:
  bootstrap: 5
  math-rendering: katex
  light-switch: true

reference:
  - title: Transmission cluster detection algorithms
    desc: >
      A collection of algorithms for detecting transmission clusters in epidemiological data.
    contents:
      - get_tn_clusters_snp_thresh
      - get_tn_clusters_sv_index

  - title: Statistics
    desc: >
      Functions for statistical analysis of transmission clustering results.
    contents:
      - intra_cluster_genetic_var_analysis
      - intra_cluster_genetic_distances
      - compute_cluster_duration_metrics
      - cluster_overlap_perm_test

  - title: Cluster comparison
    desc: >
      Functions for comparing different cluster assignments using contingency tables,
      information-theoretic measures, and source concordance.
    contents:
      - cluster_contingency_table
      - adjusted_mutual_information
      - ami_from_contingency
      - adjusted_rand_index
      - ari_from_contingency
      - fraction_convert_same_source
      - fraction_convert_same_source_from_lookups

  - title: Epidemiological overlap analysis
    desc: >
      Functions for analyzing patient overlap within and between transmission clusters,
      and categorizing clusters by epidemiological patterns.
    contents:
      - isolate_isolate_overlap
      - isolate_isolate_sequential_overlap
      - cluster_isolate_overlap
      - fraction_converts_with_overlap
      - categorize_cluster_overlap
      - cluster_patient_categorization
      - flatten_cluster_patient_categorization

  - title: Utilities
    desc: >
      A collection of utility functions for this package.
    contents:
      - get_snp_dist_matrix
      - get_phylo_tree
      - get_isolate_lookup
      - get_non_single_patient_clusters
      - remove_singleton_clusters
