url: https://theabhirath.github.io/transclust

authors:
  Abhirath Anand:
    href: https://theabhirath.github.io

template:
  bootstrap: 5
  math-rendering: katex
  light-switch: true

reference:
  - title: Transmission cluster detection algorithms
    desc: >
      A collection of algorithms for detecting transmission clusters in epidemiological data.
    contents:
      - get_tn_clusters_snp_thresh
      - get_tn_clusters_sv_index
  - subtitle: Rcpp helper functions
    desc: >
      A collection of helper functions used internally by `get_tn_clusters_sv_index()` written in Rcpp for performance.
    contents:
      - computeSharedMatrix
      - computeDefiningVariants

  - title: Visualization
    desc: >
      A collection of functions for visualizing results generated by this package.
    contents:
      - plot_clusters_phylo
      - compare_clusters
      - cluster_genetic_context
      - cluster_summary
      - cluster_context_2
      - cluster_intra_versus_inter_context
      - cluster_property_report
      - intra_pt_genetic_var_analysis

  - title: Statistics
    desc: >
      A collection of functions for statistical analysis of results generated by this package.
    contents:
      - intra_cluster_genetic_var_analysis

  - title: Utilities
    desc: >
      A collection of utility functions for this package.
    contents:
      - get_snp_dist_matrix
      - get_phylo_tree
